name: Build Claudia blog
on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  build-deploy:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Taipei
    steps:
      - uses: actions/checkout@v4
      - run: npm install hexo-cli -g
      - run: npm ci
      - run: hexo generate
      - name: deploy
        uses: JamesIves/github-pages-deploy-action@releases/v4
        with:
          clean: true
          branch: gh-pages
          folder: public/
